# ═══════════════════════════════════════════════════════════
# TEMPLATE SENSORS packages/pumpsteer.yaml
# ═══════════════════════════════════════════════════════════
template:
  - sensor:
      - name: "PumpSteer Operating Mode"
        unique_id: ps_operating_mode
        state: >
          {% set mode = state_attr('sensor.pumpsteer', 'mode') %}
          {% if mode == 'normal' %}        Regulating
          {% elif mode == 'preheating' %}  Pre-heating
          {% elif mode == 'pre_braking' %} Brake warming
          {% elif mode == 'braking' %}     Saving
          {% elif mode == 'summer_mode' %} Summer
          {% elif mode == 'precool' %}     Pre-cooling
          {% elif mode == 'holiday' %}     Holiday
          {% else %}                       {{ mode | default('Starting...') | title }}
          {% endif %}
        icon: >
          {% set mode = state_attr('sensor.pumpsteer', 'mode') %}
          {% if mode == 'normal' %}        mdi:tune
          {% elif mode == 'preheating' %}  mdi:fire-alert
          {% elif mode == 'pre_braking' %} mdi:car-brake-alert
          {% elif mode == 'braking' %}     mdi:piggy-bank
          {% elif mode == 'summer_mode' %} mdi:weather-sunny
          {% elif mode == 'precool' %}     mdi:snowflake-alert
          {% elif mode == 'holiday' %}     mdi:beach
          {% else %}                       mdi:help-circle
          {% endif %}

      - name: "PumpSteer Status"
        unique_id: ps_status_summary
        state: >
          {% set mode = state_attr('sensor.pumpsteer', 'mode') %}
          {% set price = state_attr('sensor.pumpsteer', 'price_category') | default('') %}
          {% set indoor = state_attr('sensor.pumpsteer', 'indoor_temperature') | float(0) %}
          {% set target = state_attr('sensor.pumpsteer', 'target_temperature') | float(0) %}
          {% set diff = (indoor - target) | round(1) %}
          {% if mode == 'normal' %}
            🎛️ Regulating ({{ diff }}°C)
          {% elif mode == 'preheating' %}
            🔥 Pre-heating before expensive period
          {% elif mode == 'pre_braking' %}
            ⏱️ Brake warming — expensive soon
          {% elif mode == 'braking' %}
            💰 Saving — {{ price | title }} price
          {% elif mode == 'summer_mode' %}
            ☀️ Summer mode — no heating needed
          {% elif mode == 'precool' %}
            🧊 Pre-cooling — warm period ahead
          {% elif mode == 'holiday' %}
            🏖️ Holiday mode
          {% else %}
            🔄 Starting up...
          {% endif %}
        icon: mdi:information-outline

      - name: "PumpSteer Price"
        unique_id: ps_price_category
        state: >
          {% set cat = state_attr('sensor.pumpsteer', 'price_category') | default('') %}
          {% if cat == 'cheap' %}    Cheap
          {% elif cat == 'normal' %} Normal
          {% elif cat == 'expensive' %} Expensive
          {% else %}                 Unknown
          {% endif %}
        icon: >
          {% set cat = state_attr('sensor.pumpsteer', 'price_category') | default('') %}
          {% if cat == 'cheap' %}    mdi:cash-minus
          {% elif cat == 'normal' %} mdi:cash
          {% elif cat == 'expensive' %} mdi:cash-plus
          {% else %}                 mdi:help-circle
          {% endif %}

      - name: "PumpSteer Temperature Difference"
        unique_id: ps_temp_diff
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set indoor = state_attr('sensor.pumpsteer', 'indoor_temperature') %}
          {% set target = state_attr('sensor.pumpsteer', 'target_temperature') %}
          {% if indoor is not none and target is not none %}
            {{ (indoor | float(0) - target | float(0)) | round(1) }}
          {% else %}
            unavailable
          {% endif %}
        availability: >
          {{ state_attr('sensor.pumpsteer', 'indoor_temperature') is not none and
             state_attr('sensor.pumpsteer', 'target_temperature') is not none }}
        icon: mdi:home-thermometer-outline

      - name: "PumpSteer Fake Temp Delta"
        unique_id: ps_fake_temp_delta
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: >
          {% set fake = states('sensor.pumpsteer') %}
          {% set real = state_attr('sensor.pumpsteer', 'outdoor_temperature') %}
          {% if fake not in ['unknown', 'unavailable'] and real is not none %}
            {{ (fake | float(0) - real | float(0)) | round(1) }}
          {% else %}
            unavailable
          {% endif %}
        availability: >
          {{ states('sensor.pumpsteer') not in ['unknown', 'unavailable']
             and state_attr('sensor.pumpsteer', 'outdoor_temperature') is not none }}
        icon: mdi:swap-horizontal-bold

      - name: "PumpSteer Brake Factor"
        unique_id: ps_brake_factor
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {{ (state_attr('sensor.pumpsteer', 'brake_factor') | float(0) * 100) | round(0) }}
        icon: mdi:car-brake-alert

      - name: "PumpSteer Is Saving"
        unique_id: ps_is_saving
        state: >
          {% set mode = state_attr('sensor.pumpsteer', 'mode') %}
          {{ mode in ['braking', 'preheating', 'pre_braking'] }}
        icon: mdi:piggy-bank

      - name: "PumpSteer Holiday Status"
        unique_id: ps_holiday_status
        state: >
          {% set active = is_state('switch.pumpsteer_holiday_mode', 'on') %}
          {% set start = states('datetime.pumpsteer_holiday_start') %}
          {% set end = states('datetime.pumpsteer_holiday_end') %}
          {% if active %}
            {% if end not in ['unknown','unavailable',''] %}
              🏖️ Active until {{ as_datetime(end).strftime('%d/%m %H:%M') }}
            {% else %}
              🏖️ Active (manual)
            {% endif %}
          {% elif start not in ['unknown','unavailable',''] and end not in ['unknown','unavailable',''] %}
            {% if as_datetime(start).year > 1970 and as_datetime(start) > now() %}
              ⏳ Starts {{ as_datetime(start).strftime('%d/%m %H:%M') }}
            {% else %}
              ✅ Off
            {% endif %}
          {% else %}
            ✅ Off
          {% endif %}
        icon: mdi:beach

      - name: "PumpSteer Price Thresholds"
        unique_id: ps_price_thresholds
        state: >
          {% set p30 = state_attr('sensor.pumpsteer', 'p30') %}
          {% set p80 = state_attr('sensor.pumpsteer', 'p80') %}
          {% if p30 is not none and p80 is not none %}
            P30: {{ p30 }} / P80: {{ p80 }} SEK
          {% else %}
            Calculating...
          {% endif %}
        icon: mdi:chart-bell-curve
