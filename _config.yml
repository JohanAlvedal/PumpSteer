title: PumpSteer
description: Smart heat pump optimization for Home Assistant
baseurl: "/PumpSteer"
url: "https://johanalvedal.github.io"

theme: just-the-docs

logo: "/assets/img/logo.png"

favicon_ico: "/assets/img/favicon.ico"

# Color scheme: dark or light
color_scheme: light

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation
nav_sort: order

# Footer
footer_content: "© Johan Älvedal — <a href=\"https://github.com/JohanAlvedal/PumpSteer\">GitHub</a> · License: AGPL-3.0"

# GitHub link (top-right corner)
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/JohanAlvedal/PumpSteer"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Back to top button
back_to_top: true
back_to_top_text: "Back to top"

# Callouts (styled blockquotes)
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Exclude from build
exclude:
  - "*.py"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - custom_components

plugins:
  - jekyll-seo-tag
